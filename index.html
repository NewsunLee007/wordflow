<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordFlow - AI词汇互动教学大屏版</title>
    <!-- Tailwind CSS (本地优先，CDN 兜底) -->
    <script src="./vendor/tailwindcss.min.js" onerror="this.onerror=null;this.src='https://cdn.tailwindcss.com'"></script>
    <script>
        // 确保 Tailwind 加载后再配置
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof tailwind !== 'undefined') {
                tailwind.config = {
                    darkMode: 'class',
                    theme: {
                        extend: {
                            animation: {
                                'blob': 'blob 7s infinite',
                                'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
                                'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                            },
                            keyframes: {
                                blob: {
                                    '0%': { transform: 'translate(0px, 0px) scale(1)' },
                                    '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                                    '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                                    '100%': { transform: 'translate(0px, 0px) scale(1)' },
                                },
                                fadeInUp: {
                                    '0%': { opacity: '0', transform: 'translateY(20px)' },
                                    '100%': { opacity: '1', transform: 'translateY(0)' },
                                }
                            }
                        }
                    }
                }
            }
        });
    </script>
    <!-- React & ReactDOM (本地优先，CDN 兜底) -->
    <script src="./vendor/react.production.min.js" onerror="this.onerror=null;this.src='https://unpkg.com/react@18/umd/react.production.min.js'"></script>
    <script src="./vendor/react-dom.production.min.js" onerror="this.onerror=null;this.src='https://unpkg.com/react-dom@18/umd/react-dom.production.min.js'"></script>
    <!-- Babel for JSX (本地优先，CDN 兜底) -->
    <script src="./vendor/babel.min.js" onerror="this.onerror=null;this.src='https://unpkg.com/@babel/standalone/babel.min.js'"></script>
    <!-- Lucide Icons (本地优先，CDN 兜底) -->
    <script src="./vendor/lucide.min.js" onerror="this.onerror=null;this.src='https://unpkg.com/lucide@latest'"></script>

    <style>
        :root {
            --app-bg: #f8fafc;
            --app-text: #0f172a;
            --panel-bg: rgba(255, 255, 255, 0.75);
            --panel-border: rgba(16, 185, 129, 0.18);
            --scroll-track: rgba(226, 232, 240, 0.8);
        }

        .dark {
            --app-bg: #0f172a;
            --app-text: #f8fafc;
            --panel-bg: rgba(30, 41, 59, 0.6);
            --panel-border: rgba(16, 185, 129, 0.15);
            --scroll-track: rgba(15, 23, 42, 0.5);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--app-bg);
            color: var(--app-text);
            overflow: hidden;
        }

        /* 酷炫的自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--scroll-track);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(16, 185, 129, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(16, 185, 129, 0.6);
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .neon-text {
            text-shadow: 0 0 20px rgba(52, 211, 153, 0.5);
        }

        .word-title {
            font-family: 'Arial Rounded MT Bold', 'Helvetica Rounded', Arial, sans-serif;
        }
    </style>
    <!-- 离线预置数据 (包含词表、AI解析、音频与图片映射) -->
    <script src="./data/prebuilt_data.js"></script>
</head>

<body class="antialiased selection:bg-emerald-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // 默认样例数据
        const defaultDataText = `教材,年级,册别,单元,单词,中文释义,音标,词性
外研版,七年级,下册,1,chocolate,巧克力，朱古力,/ˈtʃɒklət/,n.
外研版,七年级,下册,1,factory,工厂，制造厂,/ˈfæktri/,n.
外研版,七年级,下册,1,exciting,令人兴奋的；使人激动的；刺激的,/ɪkˈsaɪtɪŋ/,adj.
外研版,七年级,下册,1,magical,奇异的，美妙的，迷人的,/ˈmædʒɪkl/,adj.
外研版,七年级,下册,1,town,镇，城镇，市镇,/taʊn/,n.
外研版,七年级,下册,1,poor,贫穷的，贫困的,/pɔː/,adj.
外研版,七年级,下册,1,watery,稀薄的，味淡的,/ˈwɔːtəri/,adj.
外研版,七年级,下册,1,cabbage,卷心菜，洋白菜,/ˈkæbɪdʒ/,n.
外研版,七年级,下册,1,freezing,极冷的，严寒的,/ˈfriːzɪŋ/,adj.
外研版,七年级,下册,1,become,变成，变得,/bɪˈkʌm/,v.
外研版,七年级,下册,6,places of interest,名胜,/ˈpleɪsɪz əv ˈɪntrəst/,phr.
外研版,七年级,下册,6,hotel,宾馆，酒店,/həʊˈtel/,n.
外研版,七年级,下册,6,comfortable,舒适的,/ˈkʌmftəbl/,adj.
外研版,七年级,下册,6,other,另外的，其他的,/ˈʌðə/,adj.
外研版,七年级,下册,6,waterfall,瀑布,/ˈwɔːtəfɔːl/,n.
外研版,七年级,下册,6,powerful,猛烈的，有力的,/ˈpaʊəfl/,adj.
外研版,七年级,下册,6,thunder,雷声,/ˈθʌndə/,n.
外研版,七年级,下册,6,painting,绘画（作品）,/ˈpeɪntɪŋ/,n.
外研版,七年级,下册,6,roller coaster,过山车,/ˈrəʊlə ˈkəʊstə/,phr.
外研版,七年级,下册,6,huge,巨大的，庞大的,/hjuːdʒ/,adj.
外研版,七年级,下册,6,myself,我自己,/maɪˈself/,pron.`;

        // 简易 CSV 解析器 (已修复短语空格截断问题)
        const parseCSV = (text) => {
            const lines = text.trim().split(/\r?\n/);
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                // 严谨正则：按逗号分割但忽略引号内的逗号，保留空格
                const row = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if (row.length >= 8) {
                    data.push({
                        textbook: row[0]?.replace(/^"|"$/g, '').replace(/""/g, '"').trim(),
                        grade: row[1]?.replace(/^"|"$/g, '').replace(/""/g, '"').trim(),
                        term: row[2]?.replace(/^"|"$/g, '').replace(/""/g, '"').trim(),
                        unit: row[3]?.replace(/^"|"$/g, '').replace(/""/g, '"').trim(),
                        word: row[4]?.replace(/^"|"$/g, '').replace(/""/g, '"').trim(),
                        meaning: row[5]?.replace(/^"|"$/g, '').replace(/""/g, '"').trim(),
                        phonetic: row[6]?.replace(/^"|"$/g, '').replace(/""/g, '"').trim(),
                        pos: row[7]?.replace(/^"|"$/g, '').replace(/""/g, '"').trim()
                    });
                }
            }
            return data;
        };

        const getLocalData = (key, defaultVal) => {
            const saved = localStorage.getItem(key);
            if (saved !== null) {
                try { return JSON.parse(saved); } catch (e) { return saved; } // 返回原始字符串，解决 API key 丢失问题
            }
            return defaultVal;
        };

        // 安全 Icon 组件
        const Icon = ({ name, className, style }) => {
            const containerRef = useRef(null);
            const styleString = JSON.stringify(style || {});

            useEffect(() => {
                let timer;
                const initIcon = () => {
                    // 安全获取 lucide 对象：无论是挂载在 window.lucide 还是直接作为全局变量 lucide
                    const lucideObj = window.lucide || (typeof lucide !== 'undefined' ? lucide : null);

                    if (containerRef.current && lucideObj && typeof lucideObj.createIcons === 'function') {
                        const iconElement = document.createElement('i');
                        iconElement.setAttribute('data-lucide', name);
                        if (className) iconElement.className = className;
                        
                        containerRef.current.innerHTML = '';
                        containerRef.current.appendChild(iconElement);
                        
                        try {
                            lucideObj.createIcons({ root: containerRef.current });
                            const svg = containerRef.current.querySelector('svg');
                            if (svg && style) {
                                Object.assign(svg.style, style);
                            }
                        } catch (e) {
                            console.error("Failed to create icon:", name, e);
                        }
                    } else {
                        // 继续轮询
                        timer = setTimeout(initIcon, 100);
                    }
                };

                initIcon();

                return () => clearTimeout(timer);
            }, [name, className, styleString]);

            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [words, setWords] = useState(() => {
                const saved = localStorage.getItem('vocabularyData');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (Array.isArray(parsed) && parsed.length > 0) return parsed;
                    } catch (e) {}
                }
                const prebuilt = window.__VOCAB__;
                if (Array.isArray(prebuilt) && prebuilt.length > 0) return prebuilt;
                return parseCSV(defaultDataText);
            });
            const [aiCache, setAiCache] = useState(() => {
                const prebuilt = window.__AI_CACHE__ || {};
                const local = getLocalData('aiWordCache', {});
                return { ...prebuilt, ...local };
            });
            const [aiProvider, setAiProvider] = useState(() => getLocalData('aiProvider', 'deepseek')); // deepseek | openai | custom
            const [apiKey, setApiKey] = useState(() => getLocalData('deepseekApiKey', ''));
            const [customApiUrl, setCustomApiUrl] = useState(() => getLocalData('customApiUrl', 'https://api.deepseek.com/v1'));
            const [aiModel, setAiModel] = useState(() => getLocalData('aiModel', 'deepseek-chat'));
            const [availableModels, setAvailableModels] = useState([]);
            const [isFetchingModels, setIsFetchingModels] = useState(false);
            const [fetchModelSuccess, setFetchModelSuccess] = useState(false);
            const [isTestingApi, setIsTestingApi] = useState(false);
            const [ttsEndpoint, setTtsEndpoint] = useState(() => getLocalData('ttsEndpoint', ''));
            const [aiDetailMode, setAiDetailMode] = useState(() => getLocalData('aiDetailMode', 'normal'));
            const [exampleSpeed, setExampleSpeed] = useState(() => parseFloat(getLocalData('exampleSpeed', '1.0')));
            const [ttsVoice, setTtsVoice] = useState(() => getLocalData('ttsVoice', 'en-US-AriaNeural'));
            const [themeMode, setThemeMode] = useState(() => getLocalData('themeMode', 'system')); // system | light | dark
            
            const [voices, setVoices] = useState([]);
            const [selectedVoiceURI, setSelectedVoiceURI] = useState(() => getLocalData('preferredVoiceURI', ''));
            
            // 自动实时保存设置到 localStorage，防止刷新丢失（针对部分允许 file:// 存储的浏览器）
            useEffect(() => {
                localStorage.setItem('deepseekApiKey', apiKey);
                localStorage.setItem('aiProvider', aiProvider);
                localStorage.setItem('customApiUrl', customApiUrl);
                localStorage.setItem('aiModel', aiModel);
                localStorage.setItem('ttsEndpoint', ttsEndpoint);
            }, [apiKey, aiProvider, customApiUrl, aiModel, ttsEndpoint]);

            const [currentUnit, setCurrentUnit] = useState(null);
            const [currentWord, setCurrentWord] = useState(null);

            const [currentSlide, setCurrentSlide] = useState(0);
            const [sidebarWidth, setSidebarWidth] = useState(() => Number(getLocalData('sidebarWidth', 320)) || 320);
            
            // 新增交互控制状态
            const [revealedSections, setRevealedSections] = useState({});
            const [isWordMasked, setIsWordMasked] = useState(false);
            const [isMeaningMasked, setIsMeaningMasked] = useState(false);
            const [speakMode, setSpeakMode] = useState('normal'); // 'normal' | 'teaching'
            
            // 自动跟读控制状态
            const [isAutoPlaying, setIsAutoPlaying] = useState(false);
            const [autoPlayInterval, setAutoPlayInterval] = useState(3); // 默认间隔3秒
            
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [showSettings, setShowSettings] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [loadingProgress, setLoadingProgress] = useState(0);

            const fileInputRef = useRef(null);
            const contentRef = useRef(null); 
            const isResizingSidebarRef = useRef(false);
            const audioDbRef = useRef(null);

            const getWordKey = useCallback((w) => {
                if (!w) return '';
                const parts = [w.textbook, w.grade, w.term, w.unit, w.word].map(v => (v ?? '').toString().trim());
                return parts.join('|');
            }, []);

            const currentWordKey = useMemo(() => getWordKey(currentWord), [currentWord, getWordKey]);

            useEffect(() => {
                const media = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;
                const applyTheme = () => {
                    const shouldDark = themeMode === 'dark' || (themeMode === 'system' && media && media.matches);
                    document.documentElement.classList.toggle('dark', shouldDark);
                };

                applyTheme();

                if (media && themeMode === 'system') {
                    const handler = () => applyTheme();
                    if (media.addEventListener) media.addEventListener('change', handler);
                    else media.addListener(handler);
                    return () => {
                        if (media.removeEventListener) media.removeEventListener('change', handler);
                        else media.removeListener(handler);
                    };
                }
            }, [themeMode]);

            // 加载语音
            useEffect(() => {
                const loadVoices = () => {
                    const availableVoices = window.speechSynthesis.getVoices();
                    const englishVoices = availableVoices.filter(v => v.lang.startsWith('en'));
                    setVoices(englishVoices);

                    if (!getLocalData('preferredVoiceURI', '') && englishVoices.length > 0) {
                        const defaultFemale = englishVoices.find(v => 
                            v.name.includes('Female') || v.name.includes('Hazel') || 
                            v.name.includes('Zira') || v.name.includes('Samantha') || 
                            v.name.includes('Google UK English Female') 
                        );
                        setSelectedVoiceURI(defaultFemale ? defaultFemale.voiceURI : englishVoices[0].voiceURI);
                    }
                };

                loadVoices();
                if (window.speechSynthesis.onvoiceschanged !== undefined) {
                    window.speechSynthesis.onvoiceschanged = loadVoices;
                }
            }, []);

            // 切换单词时重置主内容滚动条与状态
            useEffect(() => {
                if (contentRef.current) {
                    contentRef.current.scrollTop = 0;
                }
                setRevealedSections({}); // 切换单词时重新锁定模块
                setCurrentSlide(0);
            }, [currentWord]);

            // 左侧单词列表跟随选中单词自动滚动
            useEffect(() => {
                if (currentWord) {
                    // 使用 setTimeout 确保渲染完毕后执行滚动
                    setTimeout(() => {
                        const el = document.getElementById(`word-btn-${currentWord.word}`);
                        if (el) {
                            el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }
                    }, 50);
                }
            }, [currentWord]);

            // 切换单元时，强制关闭自动播放
            useEffect(() => {
                setIsAutoPlaying(false);
            }, [currentUnit]);

            useEffect(() => {
                const onKeyDown = (e) => {
                    const tag = document.activeElement && document.activeElement.tagName;
                    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
                    if (e.key === 'ArrowLeft') setCurrentSlide(s => Math.max(0, s - 1));
                    if (e.key === 'ArrowRight') setCurrentSlide(s => Math.min(2, s + 1));
                };

                window.addEventListener('keydown', onKeyDown);
                return () => window.removeEventListener('keydown', onKeyDown);
            }, []);

            useEffect(() => {
                const clamp = (val, min, max) => Math.min(max, Math.max(min, val));
                const onMove = (e) => {
                    if (!isResizingSidebarRef.current) return;
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const width = clamp(clientX, 240, 440);
                    setSidebarWidth(width);
                };
                const onUp = () => {
                    if (!isResizingSidebarRef.current) return;
                    isResizingSidebarRef.current = false;
                    localStorage.setItem('sidebarWidth', String(sidebarWidth));
                };

                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onUp);
                window.addEventListener('touchmove', onMove, { passive: false });
                window.addEventListener('touchend', onUp);
                window.addEventListener('touchcancel', onUp);

                return () => {
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('mouseup', onUp);
                    window.removeEventListener('touchmove', onMove);
                    window.removeEventListener('touchend', onUp);
                    window.removeEventListener('touchcancel', onUp);
                };
            }, [sidebarWidth]);

            const startSidebarResize = (e) => {
                e.preventDefault();
                isResizingSidebarRef.current = true;
            };

            const units = useMemo(() => {
                const u = [...new Set(words.map(w => w.unit))].sort((a, b) => parseInt(a) - parseInt(b));
                if (u.length > 0 && !currentUnit) setCurrentUnit(u[0]);
                return u;
            }, [words]);

            const currentWords = useMemo(() => {
                const w = words.filter(w => w.unit === currentUnit);
                if (w.length > 0 && (!currentWord || currentWord.unit !== currentUnit)) {
                    setCurrentWord(w[0]);
                }
                return w;
            }, [words, currentUnit]);

            // 发音功能（优先使用在线 TTS 或预置音频，失败回退浏览器自带语音）
            const speakWord = useCallback(async (text, isSentence = false) => {
                const playSingle = async () => {
                    // 1. 尝试读取预置离线音频映射 (预留)
                    if (window.__AUDIO_MAP__ && window.__AUDIO_MAP__[text]) {
                        return new Promise((resolve) => {
                            const audio = new Audio(window.__AUDIO_MAP__[text]);
                            audio.onended = resolve;
                            audio.onerror = () => resolve(playFallback());
                            audio.play().catch(() => resolve(playFallback()));
                        });
                    }

                    // 2. 尝试在线高质量 TTS 接口
                    if (ttsEndpoint) {
                        try {
                            const url = `${ttsEndpoint}?text=${encodeURIComponent(text)}&isSentence=${isSentence}`;
                            return new Promise((resolve) => {
                                const audio = new Audio(url);
                                audio.playbackRate = isSentence ? exampleSpeed : 1.0;
                                audio.onended = resolve;
                                audio.onerror = () => resolve(playFallback());
                                audio.play().catch(() => resolve(playFallback()));
                            });
                        } catch (e) {
                            console.warn("TTS 请求失败，回退系统语音", e);
                        }
                    }

                    // 3. 兜底方案：浏览器系统自带 TTS
                    return playFallback();
                };

                const playFallback = () => new Promise((resolve) => {
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                        const utterance = new SpeechSynthesisUtterance(text);
                        window._currentUtterance = utterance; 
                        
                        utterance.lang = 'en-GB'; 
                        utterance.rate = isSentence ? exampleSpeed : 0.85; 

                        if (selectedVoiceURI) {
                            const voice = voices.find(v => v.voiceURI === selectedVoiceURI);
                            if (voice) utterance.voice = voice;
                        }

                        utterance.onend = () => resolve();
                        utterance.onerror = () => resolve();

                        window.speechSynthesis.speak(utterance);
                    } else {
                        resolve();
                    }
                });

                if (speakMode === 'teaching' && !isSentence) {
                    const isPhrase = text.includes(' ') || text.includes('-');
                    const pauseTime = isPhrase ? 2500 : 1500; // 短语多停顿1秒

                    await playSingle();
                    await new Promise(r => setTimeout(r, pauseTime)); // 教学带读：停顿1.5秒或2.5秒
                    await playSingle(); // 重复第二遍
                } else {
                    await playSingle();
                }
            }, [voices, selectedVoiceURI, speakMode, ttsEndpoint, exampleSpeed]);

            // 自动跟读核心逻辑 Loop
            useEffect(() => {
                let timeoutId;
                let isActive = true;

                const playSequence = async () => {
                    if (isAutoPlaying && currentWord) {
                        // 1. 发音当前单词并等待发音结束
                        await speakWord(currentWord.word, false);
                        if (!isActive) return;

                        // 2. 发音结束后，等待指定的间隔时长
                        // 如果是短语 (包含空格或连字符，或者词性为 phr.)，间隔自动增加1秒
                        const isPhrase = currentWord.word.includes(' ') || currentWord.word.includes('-') || currentWord.pos === 'phr.';
                        const extraDelay = isPhrase ? 1 : 0;
                        const finalInterval = (autoPlayInterval + extraDelay) * 1000;

                        timeoutId = setTimeout(() => {
                            if (!isActive) return;
                            
                            // 3. 寻找并切换到下一个单词
                            const currentIndex = currentWords.findIndex(w => w.word === currentWord.word);
                            if (currentIndex >= 0 && currentIndex < currentWords.length - 1) {
                                setCurrentWord(currentWords[currentIndex + 1]);
                            } else {
                                // 已经读到本单元末尾，停止跟读
                                setIsAutoPlaying(false); 
                            }
                        }, finalInterval);
                    }
                };

                playSequence();

                // 清理函数：如果用户点击其他单词打断了当前流程，清除旧的定时器
                return () => {
                    isActive = false;
                    clearTimeout(timeoutId);
                };
            }, [currentWord, isAutoPlaying, autoPlayInterval, currentWords, speakWord]);


            const handleVoiceChange = (e) => {
                const uri = e.target.value;
                setSelectedVoiceURI(uri);
                localStorage.setItem('preferredVoiceURI', uri);
                speakWord("Hello, this is my voice. Nice to meet you.", true);
            };

            const fetchAIForWord = async (wordObj) => {
                if (!apiKey) { alert("请先在设置中填写 API Key"); return null; }

                let examplesCount = 3;
                let detailInstruction = "提供标准深度的解析，语言生动易懂。";
                if (aiDetailMode === 'simple') {
                    examplesCount = 2;
                    detailInstruction = "提供精简的解析，语言简练，适合快速浏览。";
                } else if (aiDetailMode === 'detailed') {
                    examplesCount = 4;
                    detailInstruction = "提供极其详细、深入的解析，提供更多背景知识和相关考点，适合教师备课使用。";

请务必只返回合法的JSON对象（不要有markdown代码块等额外文本），严格符合以下结构：
{
  "emoji": "用1个最生动贴切的emoji表情表示这个词",

  "memory": "趣味记忆法（谐音、联想、顺口溜等。${detailInstruction}）",

    } // ... 请提供 ${examplesCount} 个例句
  ]
}`;

                                { role: "user", "content": prompt }

                        })

                    const result = await response.json();

                                                                },
                                                                body: JSON.stringify({
                                                                    model: aiModel || 'deepseek-chat',
                                                                    messages: [{ role: 'user', content: 'hi' }],
                                                                    max_tokens: 5
                                                                })
                                                            });
                                                            if(res.ok) {
                                                                alert("✅ 连接成功！API 配置正确。");
                                                            } else {
                                                                const errText = await res.text();
                                                                alert(`❌ 连接失败：HTTP ${res.status}\n${errText.substring(0, 100)}...`);
                                                            }
                                                        } catch(e) {
                                                            alert("❌ 连接异常：" + e.message);
                                                        } finally {
                                                            setIsTestingApi(false);
                                                        }
                                                    }}
                                                    disabled={isTestingApi}
                                                    className="text-xs font-bold text-blue-600 dark:text-blue-400 bg-blue-100 dark:bg-blue-500/10 hover:bg-blue-200 dark:hover:bg-blue-500/20 px-3 py-1 rounded-full transition-colors flex items-center gap-1 cursor-pointer disabled:opacity-50"
                                                >
                                                    <Icon name={isTestingApi ? "loader-2" : "zap"} className={`w-3 h-3 ${isTestingApi ? "animate-spin" : ""}`} /> 
                                                    {isTestingApi ? "测试中..." : "测试连接"}
                                                </button>
                                            </div>
                                            <input 
                                                type="password" 
                                                value={apiKey} 
                                                onChange={(e) => setApiKey(e.target.value)}
                                                className="w-full px-5 py-4 bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all text-slate-800 dark:text-slate-200 font-mono"
                                                placeholder="sk-..."
                                            />
                                        </div>

                                        <div>
                                            <div className="flex items-center justify-between mb-2">
                                                <label className="block text-sm font-bold text-slate-600 dark:text-slate-300 uppercase tracking-wider">模型名称 (Model)</label>
                                                <button 
                                                    onClick={async () => {
                                                        if(!apiKey || !customApiUrl) return alert("请先填写API Key和接口地址");
                                                        setIsFetchingModels(true);
                                                        setFetchModelSuccess(false);
                                                        try {
                                                            const res = await fetch(`${customApiUrl}/models`, { headers: { 'Authorization': `Bearer ${apiKey}` } });
                                                            const data = await res.json();
                                                            if(data.data && data.data.length > 0) {
                                                                const models = data.data.map(m => m.id);
                                                                setAvailableModels(models);
                                                                if (!models.includes(aiModel)) {
                                                                    setAiModel(models[0]);
                                                                }
                                                                setFetchModelSuccess(true);
                                                            } else {
                                                                alert("未能获取到模型列表，可能是该服务商不支持此接口。");
                                                            }
                                                        } catch(e) {
                                                            alert("拉取失败：" + e.message);
                                                        } finally {
                                                            setIsFetchingModels(false);
                                                        }
                                                    }}
                                                    disabled={isFetchingModels}
                                                    className={`text-xs font-bold px-3 py-1 rounded-full transition-colors flex items-center gap-1 cursor-pointer disabled:opacity-50 ${fetchModelSuccess ? 'text-blue-600 dark:text-blue-400 bg-blue-100 dark:bg-blue-500/10' : 'text-emerald-600 dark:text-emerald-400 bg-emerald-100 dark:bg-emerald-500/10 hover:bg-emerald-200 dark:hover:bg-emerald-500/20'}`}
                                                >
                                                    {isFetchingModels ? (
                                                        <><Icon name="loader-2" className="w-3 h-3 animate-spin" /> 拉取中...</>
                                                    ) : fetchModelSuccess ? (
                                                        <><Icon name="check" className="w-3 h-3" /> 已拉取</>
                                                    ) : (
                                                        <><Icon name="refresh-cw" className="w-3 h-3" /> 拉取模型列表</>
                                                    )}
                                                </button>
                                            </div>
                                            {availableModels.length > 0 ? (
                                                <div className="relative">
                                                    <select 
                                                        value={aiModel} 
                                                        onChange={(e) => setAiModel(e.target.value)}
                                                        className="w-full px-5 py-4 bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all text-slate-800 dark:text-slate-200 appearance-none cursor-pointer font-mono text-sm"
                                                    >
                                                        {availableModels.map(m => <option key={m} value={m}>{m}</option>)}
                                                    </select>
                                                    <Icon name="chevron-down" className="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 pointer-events-none" />
                                                </div>
                                            ) : (
                                                <input 
                                                    type="text" 
                                                    value={aiModel} 
                                                    onChange={(e) => setAiModel(e.target.value)}
                                                    className="w-full px-5 py-4 bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all text-slate-800 dark:text-slate-200 font-mono text-sm"
                                                    placeholder="例如: deepseek-chat 或 gpt-4"
                                                />
                                            )}
                                        </div>

                                        <div>
                                            <label className="block text-sm font-bold text-slate-600 dark:text-slate-300 mb-2 uppercase tracking-wider">AI 生成详略模式</label>
                                            <div className="grid grid-cols-3 gap-3">
                                                <button
                                                    onClick={() => { setAiDetailMode('simple'); localStorage.setItem('aiDetailMode', 'simple'); }}
                                                    className={`py-3 px-4 rounded-xl border text-sm font-medium transition-all ${aiDetailMode === 'simple' ? 'bg-cyan-500 text-white border-cyan-500 shadow-md shadow-cyan-500/20' : 'bg-slate-50 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700'}`}
                                                >
                                                    精简 (2句)
                                                </button>
                                                <button
                                                    onClick={() => { setAiDetailMode('normal'); localStorage.setItem('aiDetailMode', 'normal'); }}
                                                    className={`py-3 px-4 rounded-xl border text-sm font-medium transition-all ${aiDetailMode === 'normal' ? 'bg-cyan-500 text-white border-cyan-500 shadow-md shadow-cyan-500/20' : 'bg-slate-50 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700'}`}
                                                >
                                                    标准 (3句)
                                                </button>
                                                <button
                                                    onClick={() => { setAiDetailMode('detailed'); localStorage.setItem('aiDetailMode', 'detailed'); }}
                                                    className={`py-3 px-4 rounded-xl border text-sm font-medium transition-all ${aiDetailMode === 'detailed' ? 'bg-cyan-500 text-white border-cyan-500 shadow-md shadow-cyan-500/20' : 'bg-slate-50 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700'}`}
                                                >
                                                    详细 (4句)
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white dark:bg-slate-900/50 p-6 rounded-2xl border border-slate-200 dark:border-slate-700/50 space-y-5 shadow-sm dark:shadow-none">
                                        <div className="flex items-center gap-2 mb-2">
                                            <Icon name="volume-2" className="w-5 h-5 text-amber-500 dark:text-amber-400" />
                                            <h4 className="text-lg font-bold text-slate-800 dark:text-slate-200">发音与语音配置</h4>
                                        </div>
                                        
                                        <div>
                                            <label className="block text-sm font-bold text-slate-600 dark:text-slate-300 mb-2 uppercase tracking-wider">发音人选择 (系统自带兜底 TTS)</label>
                                            <div className="relative">
                                                <select 
                                                    value={selectedVoiceURI} 
                                                    onChange={handleVoiceChange}
                                                    className="w-full px-5 py-4 bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all text-slate-800 dark:text-slate-200 appearance-none cursor-pointer"
                                                >
                                                    {voices.length === 0 && <option value="">加载中或无可用的语音...</option>}
                                                    {voices.map(v => (
                                                        <option key={v.voiceURI} value={v.voiceURI}>{v.name} ({v.lang})</option>
                                                    ))}
                                                </select>
                                                <Icon name="chevron-down" className="absolute right-5 top-1/2 -translate-y-1/2 text-slate-600 dark:text-slate-400 dark:text-slate-500 pointer-events-none" />
                                            </div>
                                        </div>
                                        
                                        <div>
                                            <label className="block text-sm font-bold text-slate-600 dark:text-slate-300 mb-2 uppercase tracking-wider flex justify-between">
                                                <span>在线高质量 TTS 服务地址 (选填)</span>
                                                <span className="text-emerald-600 dark:text-emerald-400 font-normal text-xs lowercase">推荐填写</span>
                                            </label>
                                            <input 
                                                type="text" 
                                                value={ttsEndpoint} 
                                                onChange={(e) => setTtsEndpoint(e.target.value)}
                                                className="w-full px-5 py-4 bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all text-slate-800 dark:text-slate-200 font-mono text-sm"
                                                placeholder="填入完整URL，例如: http://192.168.x.x:5000/tts"
                                            />
                                            <div className="mt-3 text-xs text-slate-500 dark:text-slate-400 leading-relaxed bg-slate-50 dark:bg-slate-800 p-3 rounded-lg border border-slate-200 dark:border-slate-700">
                                                <p className="mb-1"><strong className="text-slate-700 dark:text-slate-300">什么是 TTS 服务？</strong> 这是一段为您准备的音频服务接口。当您填入有效地址后，程序发音会极其清晰自然。</p>
                                                <p className="mb-1"><strong className="text-slate-700 dark:text-slate-300">可用参考接口格式 (需自行搭建或购买代理)：</strong></p>
                                                <ul className="list-disc pl-4 space-y-1 text-slate-600 dark:text-slate-500 font-mono">
                                                    <li>Edge-TTS 接口: <span className="text-slate-800 dark:text-slate-300">http://localhost:5000/api/tts</span></li>
                                                    <li>Azure TTS 接口: <span className="text-slate-800 dark:text-slate-300">https://your-azure-proxy.com/v1/audio/speech</span></li>
                                                    <li>自定义局域网: <span className="text-slate-800 dark:text-slate-300">http://192.168.1.100:8080/synthesize</span></li>
                                                </ul>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="px-8 py-5 border-t border-slate-100 dark:border-slate-700/50 bg-slate-50 dark:bg-slate-800/50 flex justify-between items-center shrink-0">
                                    <button 
                                        onClick={() => {
                                            if(confirm("警告：清空缓存将删除您手动导入的词表和生成的AI解析，恢复到默认初始状态。确定继续吗？")) {
                                                localStorage.removeItem('aiWordCache');
                                                localStorage.removeItem('vocabularyData');
                                                setAiCache({});
                                                const prebuilt = window.__VOCAB__;
                                                setWords((Array.isArray(prebuilt) && prebuilt.length > 0) ? prebuilt : parseCSV(defaultDataText));
                                                alert("缓存已清空，系统已恢复默认状态。");
                                            }
                                        }}
                                        className="text-red-500 dark:text-red-400 hover:text-red-600 dark:hover:text-red-300 text-sm font-bold px-4 py-2 hover:bg-red-50 dark:hover:bg-red-500/10 rounded-lg transition-colors cursor-pointer"
                                    >
                                        <Icon name="trash-2" className="w-4 h-4 inline mr-1" /> 清除离线缓存
                                    </button>
                                    <button 
                                        onClick={() => {
                                            localStorage.setItem('deepseekApiKey', apiKey);
                                            localStorage.setItem('aiProvider', aiProvider);
                                            localStorage.setItem('customApiUrl', customApiUrl);
                                            localStorage.setItem('aiModel', aiModel);
                                            localStorage.setItem('ttsEndpoint', ttsEndpoint);
                                            setShowSettings(false);
                                        }}
                                        className="px-8 py-3 bg-emerald-600 text-white rounded-xl hover:bg-emerald-500 font-bold transition-all shadow-md hover:shadow-lg dark:shadow-[0_0_15px_rgba(16,185,129,0.3)] dark:hover:shadow-[0_0_25px_rgba(16,185,129,0.5)] cursor-pointer"
                                    >
                                        保存并闭合
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
